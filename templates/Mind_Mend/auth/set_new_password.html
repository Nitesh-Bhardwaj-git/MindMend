{% extends 'base.html' %}

{% block title %}Set New Password - MindMend{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-10rem)] bg-[#050b1a] relative overflow-hidden flex items-center justify-center p-4">
    <!-- Background Glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] md:w-[500px] h-[300px] md:h-[500px] bg-[#00d1b2]/10 rounded-full blur-[100px] md:blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="bg-[#0a1428]/60 backdrop-blur-xl border border-white/10 rounded-[3rem] p-8 md:p-12 shadow-2xl relative overflow-hidden text-center">
            
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-[#00d1b2]/30 bg-[#00d1b2]/5 text-[#00d1b2] text-[10px] font-bold tracking-[0.2em] mb-6 uppercase">
                🔒 NEW PASSWORD
            </div>

            <h1 class="text-3xl font-bold text-white mb-4">Set New Password</h1>
            <p class="text-gray-400 text-sm leading-relaxed mb-8">
                Please enter your new password below.
            </p>

            <form method="POST" class="space-y-6 text-left">
                {% csrf_token %}
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">New Password</label>
                    <input type="password" name="password" required class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white text-sm placeholder-gray-600 outline-none focus:border-[#00d1b2] transition-all">
                </div>

                <button type="submit" class="w-full py-5 rounded-2xl bg-[#00d1b2] text-[#050b1a] font-extrabold text-sm tracking-widest hover:scale-[1.02] transition-transform flex items-center justify-center">
                    Update Password →
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
