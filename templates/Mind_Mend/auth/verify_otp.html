{% extends 'base.html' %}

{% block title %}Verify OTP - MindMend{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-10rem)] bg-[#050b1a] relative overflow-hidden flex items-center justify-center p-4">
    <!-- Background Glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] md:w-[500px] h-[300px] md:h-[500px] bg-[#00d1b2]/10 rounded-full blur-[100px] md:blur-[120px] animate-pulse pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="bg-[#0a1428]/60 backdrop-blur-xl border border-white/10 rounded-[3rem] p-8 md:p-12 shadow-2xl relative overflow-hidden text-center">
            <!-- Top Right Glow -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-[#00d1b2]/5 rounded-full blur-3xl pointer-events-none"></div>

            <!-- Badge -->
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-[#00d1b2]/30 bg-[#00d1b2]/5 text-[#00d1b2] text-[10px] font-bold tracking-[0.2em] mb-6">
                🔐 VERIFICATION
            </div>

            <h1 class="text-3xl font-bold text-white mb-4">Verify Your Email</h1>
            <p class="text-gray-400 text-sm leading-relaxed mb-8">
                We just sent a 6-digit verification code to<br>
                <strong class="text-white">{{ email }}</strong>
            </p>

            <form method="POST" action="{% url 'verify_otp' %}" class="space-y-8">
                {% csrf_token %}
                <div class="group mx-auto max-w-[320px]">
                    <label for="otp" class="sr-only">Enter OTP</label>
                    <input type="text"
                           name="otp" id="otp" placeholder="••••••" 
                           maxlength="6" autocomplete="off" required 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white text-center text-3xl tracking-[0.5em] md:tracking-[0.8em] placeholder-gray-600 outline-none hover:bg-white/10 focus:border-[#00d1b2]/50 transition-all font-mono shadow-inner">
                </div>

                <button type="submit"
                    class="w-full py-5 rounded-2xl bg-[#00d1b2] text-[#050b1a] font-extrabold text-base tracking-wider transition-all flex items-center justify-center gap-3 cursor-pointer hover:bg-[#00e6c3] hover:shadow-[0_0_20px_rgba(0,209,178,0.3)] hover:-translate-y-1">
                    Verify Account
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-white/10">
                <p class="text-sm text-gray-400 mb-0">
                    Didn't receive the code? 
                    <a href="{% url 'resend_otp' %}" class="font-bold text-[#00d1b2] hover:text-[#00e6c3] transition-colors ml-1 hover:underline">Resend OTP</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const otpInput = document.getElementById("otp");
        if(otpInput) {
            otpInput.focus();
            otpInput.addEventListener("input", function(e) {
                // Ensure only digits are entered
                this.value = this.value.replace(/[^0-9]/g, '');
            });
        }
    });
</script>
{% endblock %}
