{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center pt-5 pb-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow rounded-4 border-0">
            <div class="card-body p-5 text-center">
                
                <h3 class="fw-bold mb-3">Verify Your Email</h3>
                <p class="text-muted mb-4">
                    We just sent a 6-digit verification code to<br>
                    <strong>{{ email }}</strong>
                </p>

                <form method="POST" action="{% url 'verify_otp' %}">
                    {% csrf_token %}
                    <div class="mb-4">
                        <input type="text" class="form-control form-control-lg text-center fw-bold" 
                               name="otp" id="otp" placeholder="Enter 6-digit OTP" 
                               maxlength="6" autocomplete="off" required style="letter-spacing: 0.5rem; font-size: 1.5rem;">
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold">
                        Verify Account
                    </button>
                </form>

                <div class="mt-4">
                    <p class="small text-muted mb-0">
                        Didn't receive the code? 
                        <a href="{% url 'resend_otp' %}" class="fw-bold text-decoration-none ms-1">Resend OTP</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Simple auto-focus and digits only validation fallback
    document.addEventListener("DOMContentLoaded", function() {
        const otpInput = document.getElementById("otp");
        if(otpInput) {
            otpInput.focus();
            otpInput.addEventListener("input", function(e) {
                this.value = this.value.replace(/[^0-9]/g, '');
            });
        }
    });
</script>
{% endblock %}
