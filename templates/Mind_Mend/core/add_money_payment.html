{% extends "base.html" %}
{% load static %}
{% block title %}Complete Payment{% endblock %}

{% block content %}
<div class="min-h-screen bg-[#050b1a] relative flex items-center justify-center p-4">
  <div class="absolute top-0 left-1/4 w-[360px] h-[360px] bg-[#00d1b2]/10 rounded-full blur-[120px] animate-pulse"></div>

  <div class="bg-[#0a1428]/80 backdrop-blur-xl border border-white/10 rounded-[2rem] p-8 shadow-2xl max-w-md w-full text-center relative z-10">
    <div class="h-16 w-16 bg-[#00d1b2]/10 border border-[#00d1b2]/20 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
      💳
    </div>
    <h2 class="text-2xl font-bold text-white mb-2">Add MindMend Credits</h2>
    <p class="text-gray-400 mb-8">You are adding <strong class="text-[#00d1b2] text-xl">₹{{ amount|floatformat:"2" }}</strong> to your wallet.</p>
    
    <form id="razorpay-verify-form" method="POST" action="{% url 'add_money_verify' %}">
      {% csrf_token %}
      <input type="hidden" name="razorpay_order_id"   id="rzp_order_id">
      <input type="hidden" name="razorpay_payment_id" id="rzp_payment_id">
      <input type="hidden" name="razorpay_signature"  id="rzp_signature">
    </form>

    <button id="rzp-pay-btn" class="w-full py-4 rounded-xl font-bold text-lg transition-all duration-300 flex items-center justify-center gap-3 bg-[#00d1b2] text-black hover:scale-[1.02] active:scale-[0.98]">
      <span id="rzp-btn-text">Pay with Razorpay</span>
      <svg id="rzp-spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
      </svg>
    </button>
    <a href="{% url 'wallet_dashboard' %}" class="inline-block mt-4 text-gray-500 hover:text-white transition text-sm">Cancel</a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  var options = {
    "key": "{{ razorpay_key_id }}",
    "amount": "{{ amount_paise }}",
    "currency": "INR",
    "name": "MindMend Wallet",
    "description": "Add Credits",
    "order_id": "{{ razorpay_order_id }}",
    "handler": function (response){
        document.getElementById('rzp_order_id').value = response.razorpay_order_id;
        document.getElementById('rzp_payment_id').value = response.razorpay_payment_id;
        document.getElementById('rzp_signature').value = response.razorpay_signature;
        document.getElementById('razorpay-verify-form').submit();
    },
    "prefill": {
        "name": "{{ user_name }}",
        "email": "{{ user_email }}"
    },
    "theme": {
        "color": "#00d1b2"
    }
  };
  var rzp1 = new Razorpay(options);
  document.getElementById('rzp-pay-btn').onclick = function(e){
      document.getElementById('rzp-btn-text').innerText = 'Processing...';
      document.getElementById('rzp-spinner').classList.remove('hidden');
      rzp1.open();
      e.preventDefault();
  }
  rzp1.on('payment.failed', function (response){
        alert("Payment failed: " + response.error.description);
        document.getElementById('rzp-btn-text').innerText = 'Pay with Razorpay';
        document.getElementById('rzp-spinner').classList.add('hidden');
  });
</script>
{% endblock %}
